name: Build cherryOS 1.0 Algiers
on: [workflow_dispatch]

env:
  ALPINE_ISO_URL: "https://dl-cdn.alpinelinux.org/alpine/v3.20/releases/x86_64/alpine-virt-3.20.0-x86_64.iso"
  ALPINE_ISO_SHA256: "0b2fa4e82e79a4e4b640e11bb0c49f72753e6640924093d10a5d9255c9a0a2e1"
  ISO_NAME: "cherryOS-1.0-Algiers.iso"
  EFIBOOT_SIZE_MB: "64"

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ISO builder tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            squashfs-tools \
            genisoimage \
            syslinux \
            syslinux-utils \
            xorriso \
            file \
            wget \
            ca-certificates \
            dosfstools \
            mtools

      - name: Download and verify Alpine virt ISO
        run: |
          set -euo pipefail
          mkdir -p build/iso/boot build/mod /tmp/ext /tmp/efiboot
          echo "Downloading Alpine virt ISO from: $ALPINE_ISO_URL"
          wget -q -O /tmp/alpine.iso "$ALPINE_ISO_URL"
          echo "Downloaded file info:"
          ls -lh /tmp/alpine.iso || true
          file -b --mime-type /tmp/alpine.iso || true
          # verify checksum
          echo "${ALPINE_ISO_SHA256}  /tmp/alpine.iso" | sha256sum -c - || (echo "ERROR: SHA256 mismatch for alpine ISO" && exit 1)
          # prefer isoinfo if available
          if command -v isoinfo >/dev/null 2>&1; then
            if ! isoinfo -d -i /tmp/alpine.iso >/dev/null 2>&1; then
              echo "ERROR: isoinfo cannot read /tmp/alpine.iso as ISO. Aborting."
              exit 1
            fi
          fi
          # cleanup trap for mount
          trap 'if mountpoint -q /tmp/ext; then sudo umount /tmp/ext || true; fi' EXIT
          sudo mount -o loop /tmp/alpine.iso /tmp/ext
          sudo cp -r /tmp/ext/boot/* build/iso/boot/ 2>/dev/null || true
          sudo cp -r /tmp/ext/EFI build/iso/EFI 2>/dev/null || true
          sudo cp -r /tmp/ext/apks build/iso/ 2>/dev/null || true
          sudo umount /tmp/ext
          rm -f /tmp/alpine.iso
          trap - EXIT

      - name: Inject cherryOS rebranding & assets
        run: |
          set -euo pipefail
          mkdir -p build/mod/etc build/mod/usr/share/icons build/mod/usr/share/applications build/mod/etc/skel/Desktop
          echo "cherryos" > build/mod/etc/hostname
          cat > build/mod/etc/os-release <<'EOF'
NAME="cherryOS"
VERSION="1.0 Algiers"
ID=cherryos
ID_LIKE=alpine
PRETTY_NAME="cherryOS 1.0 Algiers"
EOF
          # Icon (optional) — consider adding to repo for guaranteed availability
          SAFARI_PNG_URL="https://upload.wikimedia.org/wikipedia/en/3/3b/Safari_14_Logo.png"
          if ! wget -q -O build/mod/usr/share/icons/safari.png "$SAFARI_PNG_URL"; then
            echo "Warning: could not download safari icon, continuing without it"
          fi
          cat > build/mod/usr/share/applications/safir.desktop <<'EOF'
[Desktop Entry]
Version=1.0
Name=Safir fi internet
Comment=Travel the web on cherryOS
Exec=midori
Icon=/usr/share/icons/safari.png
Terminal=false
Type=Application
Categories=Network;WebBrowser;
EOF
          cat > build/mod/etc/skel/Desktop/install.desktop <<'EOF'
[Desktop Entry]
Type=Application
Version=1.0
Name=Install cherryOS 1.0 Algiers
Comment=Install this system permanently
Exec=setup-alpine
Icon=system-software-install
Terminal=true
Categories=System;
EOF
          chmod +x build/mod/etc/skel/Desktop/install.desktop || true

      - name: Build mod squashfs and prepare boot files (virt-compatible)
        run: |
          set -euo pipefail
          mkdir -p build/iso/boot build/iso/isolinux
          # create squashfs named exactly as virt initramfs expects
          sudo mksquashfs build/mod build/iso/boot/modloop-virt -comp xz -noappend
          # copy isolinux/syslinux files into isolinux/
          if [ -f /usr/lib/ISOLINUX/isolinux.bin ]; then
            sudo cp /usr/lib/ISOLINUX/isolinux.bin build/iso/isolinux/ || true
          elif [ -f /usr/lib/isolinux/isolinux.bin ]; then
            sudo cp /usr/lib/isolinux/isolinux.bin build/iso/isolinux/ || true
          fi
          if [ -f /usr/lib/syslinux/modules/bios/ldlinux.c32 ]; then
            sudo cp /usr/lib/syslinux/modules/bios/ldlinux.c32 build/iso/isolinux/ || true
          elif [ -f /usr/lib/syslinux/ldlinux.c32 ]; then
            sudo cp /usr/lib/syslinux/ldlinux.c32 build/iso/isolinux/ || true
          fi
          # choose kernel/initrd preferring virt names
          KERNEL_FILE=$(ls build/iso/boot/vmlinuz-virt build/iso/boot/vmlinuz* build/iso/boot/kernel* 2>/dev/null | head -n1 || true)
          INITRD_FILE=$(ls build/iso/boot/initramfs-virt build/iso/boot/initramfs* build/iso/boot/initrd* build/iso/boot/*.img 2>/dev/null | head -n1 || true)
          if [ -z "$KERNEL_FILE" ]; then
            KERNEL_FILE=$(ls build/iso/boot/* 2>/dev/null | grep -E 'vmlinuz|kernel' | head -n1 || true)
          fi
          if [ -z "$INITRD_FILE" ]; then
            INITRD_FILE=$(ls build/iso/boot/* 2>/dev/null | grep -E 'initramf|initrd|initramfs|.img' | head -n1 || true)
          fi
          echo "Kernel chosen: ${KERNEL_FILE:-<none>}"
          echo "Initrd chosen: ${INITRD_FILE:-<none>}"
          if [ -n "$KERNEL_FILE" ]; then
            sudo cp "$KERNEL_FILE" build/iso/boot/vmlinuz || true
          fi
          if [ -n "$INITRD_FILE" ]; then
            sudo cp "$INITRD_FILE" build/iso/boot/initramfs.img || true
          fi
          # isolinux config next to isolinux.bin
          cat > build/iso/isolinux/isolinux.cfg <<'EOF'
default cherryos
label cherryos
  menu label Start cherryOS 1.0 Algiers (Live Mode)
  kernel /boot/vmlinuz
  append initrd=/boot/initramfs.img modloop=/boot/modloop-virt alpine_cmdline=quiet ---
EOF
          # If the extracted ISO has an EFI tree, build efiboot.img (as root)
          if [ -d build/iso/EFI ]; then
            EFIMG=/tmp/efiboot.img
            sudo dd if=/dev/zero of="$EFIMG" bs=1M count="${EFIBOOT_SIZE_MB}" status=none
            sudo mkfs.vfat -F32 "$EFIMG"
            sudo mkdir -p /tmp/efiboot
            sudo mount -o loop "$EFIMG" /tmp/efiboot
            sudo mkdir -p /tmp/efiboot/EFI
            sudo cp -r build/iso/EFI/* /tmp/efiboot/EFI/ || true
            sync
            sudo umount /tmp/efiboot
            sudo mkdir -p build/iso/EFI/BOOT
            sudo mv "$EFIMG" build/iso/EFI/BOOT/efiboot.img
            sudo rmdir /tmp/efiboot || true
          fi

      - name: Create ISO (BIOS + UEFI hybrid when possible)
        run: |
          set -euo pipefail
          cd build/iso
          if [ -f EFI/BOOT/efiboot.img ]; then
            xorriso -as mkisofs \
              -V "cherryOS-1.0-Algiers" \
              -o ../../${ISO_NAME} \
              -J -r -joliet-long \
              -b isolinux/isolinux.bin -c isolinux/boot.cat -no-emul-boot -boot-load-size 4 -boot-info-table \
              -eltorito-alt-boot -e EFI/BOOT/efiboot.img -no-emul-boot -isohybrid-gpt-basdat \
              .
          else
            xorriso -as mkisofs \
              -V "cherryOS-1.0-Algiers" \
              -o ../../${ISO_NAME} \
              -J -r -joliet-long \
              -b isolinux/isolinux.bin -c isolinux/boot.cat -no-emul-boot -boot-load-size 4 -boot-info-table \
              .
          fi
          if command -v isohybrid >/dev/null 2>&1; then
            if isohybrid --help 2>&1 | grep -q -- '--uefi'; then
              sudo isohybrid --uefi ../../${ISO_NAME} || echo "isohybrid --uefi returned non-zero"
            else
              sudo isohybrid ../../${ISO_NAME} || echo "isohybrid returned non-zero"
            fi
          fi
          cd ../..

      - name: Verify artifact and upload
        run: |
          set -euo pipefail
          if [ ! -f "${ISO_NAME}" ]; then
            echo "ERROR: ISO not found: ${ISO_NAME}"
            ls -la || true
            exit 1
          fi
          echo "Built ISO size:"
          ls -lh "${ISO_NAME}" || true

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: cherryOS-1.0-Algiers-iso
          path: ${{ env.ISO_NAME }}
