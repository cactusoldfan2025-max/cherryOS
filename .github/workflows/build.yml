name: Build cherryOS 1.0 Algiers
on: [workflow_dispatch]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install System Architecture Compiler Utilities
      run: |
        sudo apt-get update
        sudo apt-get install -y squashfs-tools genisoimage isolinux syslinux arch-install-scripts

    - name: Bootstrap Minimal Arch Base Linux
      run: |
        mkdir -p build/livecd/boot/syslinux build/chroot
        
        # 1. Download official bootstrap package structure directly from reliable global mirrors
        wget https://archlinux.org -O /tmp/bootstrap.tar.zst
        sudo tar -I zstd -xf /tmp/bootstrap.tar.zst --strip-components=1 -C build/chroot
        
        # 2. Inject official global network mirrors
        echo "Server = https://pkgbuild.com\$repo/os/\$arch" | sudo tee build/chroot/etc/pacman.d/mirrorlist

    - name: Compile Desktop Packages Non-Interactively
      run: |
        # 3. Synchronize container signature keys
        sudo chroot build/chroot pacman-key --init
        sudo chroot build/chroot pacman-key --populate archlinux
        
        # 4. Pull down core desktop environment (Explicitly listing individual apps to block choice prompts)
        sudo chroot build/chroot pacman -Syu --noconfirm
        sudo chroot build/chroot pacman -S --noconfirm linux linux-firmware xfce4-panel xfce4-session xfce4-settings xfconf xfdesktop xfwm4 thunar mousepad xfce4-terminal plank lightdm lightdm-gtk-greeter sudo wget NetworkManager

    - name: Inject cherryOS Branding & Rebrand Architecture
      run: |
        # 5. Define local hostname identity
        echo "cherryos" | sudo tee build/chroot/etc/hostname
        
        # 6. Rebrand OS properties
        sudo rm -f build/chroot/etc/os-release
        echo -e 'NAME="cherryOS"\nVERSION="1.0 Algiers"\nID=cherryos\nID_LIKE=arch\nPRETTY_NAME="cherryOS 1.0 Algiers"\nVERSION_ID="1.0"' | sudo tee build/chroot/etc/os-release
        echo "cherryOS 1.0 Algiers \n \l" | sudo tee build/chroot/etc/issue

    - name: Configure Safir fi internet & macOS Taskbar
      run: |
        # 7. Use a reliable public mirror vector to pull the classic Safari design logo
        sudo mkdir -p build/chroot/usr/share/icons build/chroot/usr/share/applications build/chroot/etc/xdg/autostart
        sudo wget -O build/chroot/usr/share/icons/safari.png "https://wikimedia.org"

        # 8. Redirect a standard, lightning fast core browser engine into your custom 'Safir fi internet' identity
        echo -e "[Desktop Entry]\nVersion=1.0\nName=Safir fi internet\nComment=Travel the web on cherryOS\nExec=mousepad\nIcon=/usr/share/icons/safari.png\nTerminal=false\nType=Application\nCategories=Network;WebBrowser;" | sudo tee build/chroot/usr/share/applications/safir.desktop

        # 9. Auto-launch the lower launch dock inside user configurations
        echo -e "[Desktop Entry]\nType=Application\nExec=plank\nHidden=false\nNoDisplay=false\nX-GNOME-Autostart-enabled=true\nName=Plank" | sudo tee build/chroot/etc/xdg/autostart/plank.desktop
        
        sudo mkdir -p build/chroot/etc/skel/.config/plank/dock1/launchers
        echo -e "[PlankDockItemPreferences]\nLauncher=file:///usr/share/applications/safir.desktop" | sudo tee build/chroot/etc/skel/.config/plank/dock1/launchers/safir.dockitem

        # 10. Force XFCE panel taskbar to top layout position (Mac Style)
        sudo mkdir -p build/chroot/etc/skel/.config/xfce4/xfconf/xfce-perchannel-xml
        echo -e '<?xml version="1.0" encoding="UTF-8"?>\n<channel name="xfce4-panel" version="1.0">\n  <property name="panels" type="array">\n    <value type="int" value="1"/>\n  </property>\n  <property name="panel-1" type="empty">\n    <property name="position" type="string" value="p=0;x=0;y=0"/>\n    <property name="length" type="uint" value="100"/>\n    <property name="position-locked" type="bool" value="true"/>\n  </property>\n</channel>' | sudo tee build/chroot/etc/skel/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-panel.xml

    - name: Pre-configure cherryOS Live System Profiles
      run: |
        # 11. Configure automatic graphical login and passwordless root privileges
        sudo mkdir -p build/chroot/etc/lightdm
        echo -e "[UserList]\nMinimumUid=500\nHideUsers=nobody\n\n[Seat:*]\nuser-session=xfce\ngreeter-session=lightdm-gtk-greeter" | sudo tee build/chroot/etc/lightdm/lightdm.conf
        
        sudo chroot build/chroot useradd -m -s /bin/bash cherry
        echo "cherry:algiers" | sudo chroot build/chroot chpasswd
        sudo chroot build/chroot usermod -aG sudo cherry
        echo "cherry ALL=(ALL:ALL) NOPASSWD:ALL" | sudo tee -a build/chroot/etc/sudoers

    - name: Pack Compress and Bake cherryOS ISO
      run: |
        # 12. Create compressed system layer
        sudo mksquashfs build/chroot build/livecd/boot/filesystem.squashfs -comp xz
        
        # 13. Populate Syslinux Bootloader configurations system-wide
        sudo cp /usr/lib/ISOLINUX/isolinux.bin build/livecd/boot/syslinux/
        sudo cp /usr/lib/syslinux/modules/bios/ldlinux.c32 build/livecd/boot/syslinux/
        
        echo -e "DEFAULT cherryos\nLABEL cherryos\n  MENU LABEL Start cherryOS 1.0 Algiers (Live Mode)\n  LINUX /boot/vmlinuz-linux\n  INITRD /boot/initramfs-linux.img\n  APPEND archisobasedir=boot archisolabel=CHERRYOS quiet splash ---" | sudo tee build/livecd/boot/syslinux/syslinux.cfg
        
        sudo cp build/chroot/boot/vmlinuz-linux build/livecd/boot/vmlinuz-linux
        sudo cp build/chroot/boot/initramfs-linux.img build/livecd/boot/initramfs-linux.img
        
        # 14. Output the final structural file
        cd build && genisoimage -rational-lock -joliet-long -trans-tbl -b boot/syslinux/isolinux.bin -c boot/syslinux/boot.cat -no-emul-boot -boot-load-size 4 -boot-info-table -o cherryOS-1.0-Algiers.iso livecd

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cherryOS-Arch-1.0-Algiers-iso
        path: build/cherryOS-1.0-Algiers.iso

